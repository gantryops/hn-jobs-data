name: HN Jobs Pipeline

on:
  schedule:
    - cron: "0 10 3 * *"  # 3rd of month — thread is posted on first weekday
    - cron: "0 10 28 * *" # 28th of month — catch late postings before month ends
  workflow_dispatch: # Manual trigger

concurrency:
  group: pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit JSON files
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec tsx scripts/run.ts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/ indexes/
          git diff --staged --quiet || git commit -m "data: $(date -u +'%Y-%m-%d') pipeline run"
          git push

  # Deploy data to this repo's Pages so the site can fetch the fresh JSON.
  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - name: Stage deployable content
        run: |
          mkdir _site
          cp -r indexes _site/indexes
          cp -r runs _site/runs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4

  # Only ping the site repo once the new data is live on Pages.
  trigger-site:
    needs: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_KEY }}
          owner: gantryops
          repositories: hn-jobs-site

      - name: Trigger site rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api repos/gantryops/hn-jobs-site/dispatches -f event_type=data-updated
