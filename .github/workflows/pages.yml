name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "indexes/**"
      - "runs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - name: Stage deployable content
        run: |
          mkdir _site
          cp -r indexes _site/indexes
          cp -r runs _site/runs
          cp CNAME _site/CNAME

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
